[pytest]
asyncio_default_fixture_loop_scope = function
testpaths = stock_ultimate_system/tests
python_files = test_*.py
norecursedirs = .git .venv __pycache__ .pytest_cache _archive data
markers =
    fast: low-latency unit or entry-policy checks that should complete quickly in daily development.
    integration: medium-cost integration checks that exercise multiple release pipeline components without being the minimal E2E set.
    e2e: end-to-end CLI release path checks kept intentionally small in count because they are the slowest and most production-like.
