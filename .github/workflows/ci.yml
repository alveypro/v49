name: Airivo CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  core:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pandas numpy

      - name: Core import smoke
        run: |
          python - <<'PY'
          import openclaw.services.lineage_service
          import openclaw.services.backtest_credibility_service
          import openclaw.services.data_quality_service
          import openclaw.services.decision_service
          import openclaw.services.execution_order_service
          import openclaw.services.execution_evidence_service
          import openclaw.services.experiment_governance_service
          import openclaw.services.professional_audit_service
          import openclaw.services.release_gate_service
          import openclaw.services.release_event_service
          import openclaw.runtime.backtest_stats
          import openclaw.runtime.backtest_workers
          import openclaw.runtime.combo_signal_evaluator
          import openclaw.runtime.v49_app_router
          import openclaw.runtime.v49_backtest_entry
          import openclaw.runtime.v49_data_ops_entry
          import openclaw.runtime.v49_entry_dispatcher
          import openclaw.runtime.v49_research_entries
          import openclaw.runtime.v49_sidebar
          import openclaw.runtime.v49_strategy_evolution_entry
          import openclaw.runtime.v49_today_decision_entry
          import openclaw.runtime.v49_trading_assistant_entry
          import openclaw.runtime.v8_advanced_factor_aggregator
          import openclaw.runtime.v8_atr_risk
          import openclaw.runtime.v8_core_factors
          import openclaw.runtime.v8_evaluation_handler
          import openclaw.runtime.v8_market_regime
          import openclaw.runtime.v8_signal_evaluator
          import openclaw.runtime.v9_signal_evaluator
          import openclaw.adapters.v49_adapter
          import openclaw.services.release_dry_run_fixture_service
          import openclaw.services.release_dry_run_service
          PY

      - name: Professional schema and service tests
        run: pytest tests/test_professional_system_services.py tests/test_execution_evidence_service.py tests/test_experiment_governance_service.py tests/test_backtest_credibility_service.py tests/test_release_dry_run_service.py tests/test_release_dry_run_fixture_service.py tests/test_backtest_stats.py tests/test_backtest_workers.py tests/test_v49_backtest_entry.py tests/test_v49_data_ops_entry.py tests/test_v49_research_entries.py tests/test_v49_strategy_evolution_entry.py tests/test_v49_today_decision_entry.py tests/test_v49_trading_assistant_entry.py tests/test_v49_entry_dispatcher.py tests/test_v49_sidebar.py tests/test_v49_app_router.py tests/test_v8_legacy_facades.py tests/test_v8_evaluation_handler.py tests/test_v8_atr_risk.py tests/test_v8_market_regime.py tests/test_v8_core_factors.py tests/test_v8_advanced_factor_aggregator.py tests/test_v8_signal_evaluator.py tests/test_v9_signal_evaluator.py tests/test_combo_signal_evaluator.py tests/test_v49_adapter.py -q

      - name: Governance gate
        id: governance_gate
        continue-on-error: true
        env:
          GOVERNANCE_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          GOVERNANCE_HEAD_SHA: ${{ github.sha }}
          AIRIVO_EXECUTION_ATTRIBUTION_HYGIENE_STALE_MINUTES: "30"
        run: bash _archive/tools/run_governance_gate_ci.sh

      - name: Build governance PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GOVERNANCE_STEP_OUTCOME: ${{ steps.governance_gate.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          marker = "<!-- airivo-governance-gate-comment -->"
          logs = Path("logs/openclaw")
          logs.mkdir(parents=True, exist_ok=True)
          out_dir = Path("artifacts")
          out_dir.mkdir(parents=True, exist_ok=True)
          out = out_dir / "governance_pr_comment.md"

          def latest(pattern: str) -> Path | None:
              files = sorted(logs.glob(pattern), key=lambda p: p.stat().st_mtime, reverse=True)
              return files[0] if files else None

          outcome = str(os.getenv("GOVERNANCE_STEP_OUTCOME") or "unknown")
          status_icon = {
              "success": "✅",
              "failure": "❌",
              "cancelled": "⚠️",
              "skipped": "⏭️",
          }.get(outcome, "ℹ️")

          stage_audit = latest("strategy_optimization_stage_audit_*.json")
          hygiene = latest("execution_attribution_backfill_dry_run_*.json")

          lines = [
              marker,
              "## Governance Gate Result",
              "",
              f"- Outcome: {status_icon} `{outcome}`",
          ]

          if stage_audit is not None:
              lines.append(f"- Stage audit artifact: `{stage_audit}`")
          else:
              lines.append("- Stage audit artifact: not generated in this run")

          if hygiene is not None:
              lines.append(f"- Execution attribution hygiene artifact: `{hygiene}`")
              try:
                  payload = json.loads(hygiene.read_text(encoding="utf-8"))
              except Exception:
                  payload = {}
              patched = int(payload.get("patched_count", 0) or 0)
              selected = int(payload.get("selected_count", 0) or 0)
              lines.append(f"- Hygiene dry-run selected: `{selected}`, patched: `{patched}`")
              if patched > 0:
                  lines.append("- Remediation required: run `tools/backfill_execution_attribution.py --apply ...` and rerun gate.")
          else:
              lines.append("- Execution attribution hygiene artifact: not generated in this run")

          lines.extend(
              [
                  "",
                  "Runbook: `_archive/docs/AIRIVO_GOVERNANCE_GATE_RUNBOOK.md`",
                  "",
              ]
          )
          out.write_text("\n".join(lines), encoding="utf-8")
          print(out)
          PY

      - name: Append governance summary
        if: always()
        run: |
          if [ -f artifacts/governance_pr_comment.md ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/governance_pr_comment.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upsert governance PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- airivo-governance-gate-comment -->';
            const body = fs.readFileSync('artifacts/governance_pr_comment.md', 'utf8');
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(c => (c.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Upload governance comment artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-gate-comment
          path: artifacts/governance_pr_comment.md
          if-no-files-found: ignore

      - name: Fail workflow if governance gate failed
        if: steps.governance_gate.outcome != 'success'
        run: |
          echo "Governance gate failed; see PR comment for latest artifacts."
          exit 1

      - name: Release dry-run preflight evidence
        run: |
          python tools/build_release_dry_run_fixture.py \
            --db artifacts/release_dry_run/fixture.db \
            --payload artifacts/release_dry_run/fixture_payload.json \
            --report artifacts/release_dry_run/fixture_report.md \
            --code-root "$GITHUB_WORKSPACE" \
            --operator ci \
            --overwrite
          mkdir -p data
          cp artifacts/release_dry_run/fixture.db data/openclaw.db
          python _archive/tools/release_dry_run_audit.py \
            --db "${AIRIVO_DB_PATH:-data/openclaw.db}" \
            --code-root "$GITHUB_WORKSPACE" \
            --output artifacts/release_dry_run/current_readiness_payload.json \
            --operator ci \
            --non-blocking
          python _archive/tools/release_dry_run_audit.py \
            --trend artifacts/release_dry_run \
            --output artifacts/release_dry_run/readiness_trend.json \
            --markdown-output artifacts/release_dry_run/readiness_trend.md \
            --stable-threshold 2 \
            --non-blocking
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat artifacts/release_dry_run/readiness_trend.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload release dry-run evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-run-evidence
          path: artifacts/release_dry_run/
          if-no-files-found: ignore
