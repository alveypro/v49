name: Archived research nightly

on:
  schedule:
    - cron: "23 19 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  archived-research:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pandas numpy

      - name: Archived ensemble and rerun governance tests
        run: |
          pytest \
            tests/test_ensemble_*.py \
            tests/test_strategy_competition_formal_rerun_*.py \
            tests/test_strategy_competition_post_rerun_*.py \
            tests/test_promotion_decision_artifact_service.py \
            tests/test_release_dry_run_service.py \
            tests/test_release_dry_run_fixture_service.py \
            -q
