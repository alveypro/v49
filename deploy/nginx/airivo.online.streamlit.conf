##
# Nginx reverse proxy for Streamlit (v49) on airivo.online
# Drop-in example: include this server block in your nginx site config.
##

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream v49_streamlit_upstream {
    server 127.0.0.1:8501;
    keepalive 32;
}

server {
    listen 80;
    server_name airivo.online www.airivo.online;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # airivo.online serves a Streamlit app at the site root.
    # Redirect common auth-style deep links back to the real entrypoint.
    location = /login { return 302 /; }
    location = /signin { return 302 /; }

    # If TLS is terminated elsewhere (e.g. CDN), keep this block.
    # If Nginx terminates TLS, mirror the same location settings in 443 server.
    location ^~ /static/ {
        proxy_pass http://v49_streamlit_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Static assets benefit from buffering and long-lived browser cache.
        proxy_buffering on;
        proxy_request_buffering on;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    location = /_stcore/stream {
        proxy_pass http://v49_streamlit_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        send_timeout 3600s;

        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding off;

        # The websocket entrypoint must not be cached either.
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    location ^~ /_stcore/ {
        proxy_pass http://v49_streamlit_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        send_timeout 3600s;

        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding off;

        # Session bootstrap endpoints should never be cached.
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    location / {
        proxy_pass http://v49_streamlit_upstream;
        proxy_http_version 1.1;

        # Required for Streamlit websocket upgrade.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Prevent idle websocket disconnect for long scans/backtests.
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        send_timeout 3600s;

        # Streamlit streams incremental messages; buffering can break behavior.
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
}
