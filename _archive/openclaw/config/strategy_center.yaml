auto_apply_backtest_best: true
backtest_best_dir: logs/openclaw
rejected_backtest_artifacts_file: logs/openclaw/rejected_backtest_artifacts.jsonl
runtime_defaults:
  v5:
    score_threshold: 70
    sample_size: 50
    holding_days: 3
  v8:
    score_threshold: 50
    sample_size: 50
    holding_days: 6
  v9:
    score_threshold: 70
    sample_size: 80
    holding_days: 8
  combo:
    score_threshold: 65
    sample_size: 50
    holding_days: 6
risk_overrides:
  v5:
    win_rate_min: 0.55
    max_drawdown_max: 0.3
    signal_density_min: 0.02
  v8:
    win_rate_min: 0.35
    max_drawdown_max: 0.38
    signal_density_min: 0.05
  v9:
    win_rate_min: 0.38
    max_drawdown_max: 0.45
    signal_density_min: 0.05
  combo:
    win_rate_min: 0.38
    max_drawdown_max: 0.35
    signal_density_min: 0.05
strategy_weights:
  v5: 0.1
  v8: 0.3153
  v9: 0.2916
  combo: 0.2931
run_policy:
  default:
    timeout_sec: 900
    retry_on_no_picks: 1
    no_picks_retry_max: 2
  v9:
    timeout_sec: 720
    offline_stock_limit: 40
    sample_size: 50
    retry_on_no_picks: 0
  v8:
    timeout_sec: 720
    offline_stock_limit: 40
    sample_size: 50
    retry_on_no_picks: 0
  v5:
    timeout_sec: 720
    sample_size: 50
  combo:
    timeout_sec: 840
    sample_size: 80
    retry_on_no_picks: 0
regression_gate:
  min_picks: 1
  max_scan_sec: 600
health_gate:
  stale_run_hours_warn: 48
  stale_run_hours_fail: 96
weekly_sweep:
  min_weight: 0.1
  strategies:
    v5:
      score_thresholds: [60, 65, 70]
      sample_sizes: [30, 40, 50]
      holding_days: [2, 3, 4, 5]
    v8:
      score_thresholds: [45, 50, 55]
      sample_sizes: [50, 80]
      holding_days: [6, 8]
    v9:
      score_thresholds: [60, 65, 70]
      sample_sizes: [50, 80]
      holding_days: [6, 8]
    combo:
      score_thresholds: [55, 60, 65]
      sample_sizes: [50, 80]
      holding_days: [6, 8]
strategy_governance:
  lookback_days: 30
  current_primary: v5
  recommended_primary: v5
  governance_action: observe
  reason: insufficient_samples
  by_strategy: {}
  ranked: []
  as_of: '2026-04-26T16:14:00'
