# managed_by: stock_ultimate_system
##
# Productized Airivo deployment:
# - https://airivo.online/       public static product site
# - https://airivo.online/app/   protected v49 Streamlit backend
#
# Streamlit must run with:
#   AIRIVO_BASE_URL_PATH=app STREAMLIT_PORT=8501 ./start_v49_full.sh
#
# Session auth service listens on 127.0.0.1:18601 and issues signed cookies.
##

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream airivo_v49_streamlit {
    server 127.0.0.1:8501;
    keepalive 32;
}

upstream airivo_session_auth {
    server 127.0.0.1:18601;
    keepalive 8;
}

upstream airivo_stock_surface {
    server 127.0.0.1:8765;
    keepalive 8;
}

upstream airivo_apex_surface {
    server 127.0.0.1:18764;
    keepalive 8;
}

upstream airivo_apex_stock_surface {
    server 127.0.0.1:18765;
    keepalive 8;
}

upstream airivo_apex_t12_surface {
    server 127.0.0.1:18766;
    keepalive 8;
}

upstream airivo_stock_agent_api {
    server 127.0.0.1:5101;
    keepalive 8;
}

upstream airivo_ai_bridge {
    server 127.0.0.1:3443;
    keepalive 8;
}

server {
    listen 80;
    server_name airivo.online www.airivo.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name airivo.online www.airivo.online;

    # Keep the existing certbot-managed paths on the server.
    ssl_certificate /etc/letsencrypt/live/airivo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/airivo.online/privkey.pem;

    root /opt/airivo/public;
    index index.html;

    include /etc/nginx/snippets/airivo-apex.locations.conf;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /login {
        try_files /login.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location = /signin {
        return 302 /login;
    }

    location = /workspace {
        auth_request /_airivo_auth_viewer;
        error_page 401 = @airivo_login_redirect;
        try_files /workspace.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location = /workspace/ {
        auth_request /_airivo_auth_viewer;
        error_page 401 = @airivo_login_redirect;
        try_files /workspace.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location = /workspace-data.json {
        auth_request /_airivo_auth_viewer;
        error_page 401 = @airivo_login_redirect;
        try_files /workspace-data.json =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location = /auth/login {
        proxy_pass http://airivo_session_auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location = /auth/logout {
        proxy_pass http://airivo_session_auth/logout;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location = /auth/health {
        proxy_pass http://airivo_session_auth/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /auth/session {
        proxy_pass http://airivo_session_auth/session;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location = /_airivo_auth_check {
        internal;
        proxy_pass http://airivo_session_auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
    }

    location = /_airivo_auth_viewer {
        internal;
        proxy_pass http://airivo_session_auth/authorize;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Airivo-Required-Role viewer;
    }

    location = /_airivo_auth_operator {
        internal;
        proxy_pass http://airivo_session_auth/authorize;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Airivo-Required-Role operator;
    }

    location @airivo_login_redirect {
        return 302 /login?next=$request_uri;
    }

    location @airivo_workspace_redirect {
        return 302 /workspace?denied=insufficient_role;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    location = /stock {
        return 302 /stock/;
    }

    location ^~ /stock/ {
        proxy_pass http://airivo_stock_surface;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    location = /t12 {
        return 302 /T12/;
    }

    location = /t12/ {
        return 302 /T12/;
    }

    location ^~ /t12/ {
        return 302 /T12/;
    }

    location ^~ /T12/api/stock-ai-runner {
        return 404;
    }

    location ^~ /T12/ops/stock-ai-runner {
        return 404;
    }

    location = /T12 {
        return 302 /T12/;
    }

    location = /T12/ {
        root /opt/t12agent/app/templates;
        try_files /t12_index.html =404;
        add_header Cache-Control "no-store";
        auth_basic "T12 Validation Console";
        auth_basic_user_file /etc/nginx/.htpasswd_t12_validation;
    }

    location /T12/docs/ {
        alias /opt/t12agent/output/;
        autoindex off;
        add_header Cache-Control "no-store";
        auth_basic "T12 Validation Console";
        auth_basic_user_file /etc/nginx/.htpasswd_t12_validation;

        types {
            application/json json;
            text/markdown md;
            text/plain txt;
            application/yaml yaml;
            application/yaml yml;
        }
    }

    location /api/t12/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        auth_basic "T12 Validation API";
        auth_basic_user_file /etc/nginx/.htpasswd_t12_validation;
    }

    location = /health {
        proxy_pass http://airivo_stock_agent_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /chat {
        proxy_pass http://airivo_stock_agent_api/chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/ai/chat {
        proxy_pass http://airivo_ai_bridge/api/ai/chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /app {
        return 302 /app/;
    }

    location = /app/ {
        auth_request /_airivo_auth_operator;
        error_page 401 = @airivo_login_redirect;
        error_page 403 = @airivo_workspace_redirect;
        auth_request_set $airivo_username $upstream_http_x_airivo_username;
        auth_request_set $airivo_role $upstream_http_x_airivo_role;
        auth_request_set $airivo_display_name $upstream_http_x_airivo_display_name;

        proxy_pass http://airivo_v49_streamlit/app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Airivo-Username $airivo_username;
        proxy_set_header X-Airivo-Role $airivo_role;
        proxy_set_header X-Airivo-Display-Name $airivo_display_name;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        send_timeout 3600s;

        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    location = /app/_stcore/health {
        auth_request /_airivo_auth_operator;
        error_page 401 = @airivo_login_redirect;
        error_page 403 = @airivo_workspace_redirect;

        proxy_pass http://airivo_v49_streamlit/_stcore/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    location = /app/_stcore/stream {
        auth_request /_airivo_auth_operator;
        error_page 401 = @airivo_login_redirect;
        error_page 403 = @airivo_workspace_redirect;
        auth_request_set $airivo_username $upstream_http_x_airivo_username;
        auth_request_set $airivo_role $upstream_http_x_airivo_role;
        auth_request_set $airivo_display_name $upstream_http_x_airivo_display_name;

        proxy_pass http://airivo_v49_streamlit/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Airivo-Username $airivo_username;
        proxy_set_header X-Airivo-Role $airivo_role;
        proxy_set_header X-Airivo-Display-Name $airivo_display_name;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        send_timeout 3600s;
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    location ^~ /app/ {
        auth_request /_airivo_auth_operator;
        error_page 401 = @airivo_login_redirect;
        error_page 403 = @airivo_workspace_redirect;
        auth_request_set $airivo_username $upstream_http_x_airivo_username;
        auth_request_set $airivo_role $upstream_http_x_airivo_role;
        auth_request_set $airivo_display_name $upstream_http_x_airivo_display_name;

        rewrite ^/app/(.*)$ /$1 break;

        proxy_pass http://airivo_v49_streamlit;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Airivo-Username $airivo_username;
        proxy_set_header X-Airivo-Role $airivo_role;
        proxy_set_header X-Airivo-Display-Name $airivo_display_name;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        send_timeout 3600s;

        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }
}
