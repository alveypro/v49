# managed_by: stock_ultimate_system
# Airivo Apex internal-validation routes. Copy to /etc/nginx/snippets/airivo-apex.locations.conf
# and include it inside the existing airivo.online TLS server block.
# Do not place this file directly under /etc/nginx/conf.d/*.conf; nginx loads
# conf.d files at http scope, where location directives are invalid.

location = /apex {
    return 301 /apex/;
}

location = /apex/stock {
    return 410;
}

location = /apex/T12 {
    return 301 /apex/T12/;
}

location ^~ /apex/stock/ {
    return 410;
}

location /apex/T12/ {
    proxy_pass http://127.0.0.1:18766;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /apex/T12;
    proxy_read_timeout 300s;
}

location /apex/ {
    proxy_pass http://127.0.0.1:18764;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /apex;
    proxy_read_timeout 300s;
}
